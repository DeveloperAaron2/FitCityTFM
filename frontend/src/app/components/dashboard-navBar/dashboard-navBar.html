<nav
    class="fixed bottom-0 left-0 right-0 w-full z-[1000] border-t-2 border-cyan-400 bg-gray-950 shadow-[0_-4px_24px_rgba(0,0,0,0.6)]">
    <div class="flex items-center justify-around px-4 h-16">
        <div *ngFor="let link of navLinks" class="relative flex items-center justify-center">

                class="flex flex-col items-center justify-center w-12 h-12 rounded-full transition-all duration-300 hover:scale-110 group">

                <div
                    class="active-circle absolute inset-0 bg-sky-500/60 rounded-full opacity-0 transition-all duration-300 shadow-[0_0_10px_rgba(14,165,233,0.5)]">
                </div>
                <!-- Círculo para hover -->
                <div
                    class="absolute inset-0 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300 shadow-[0_0_12px_rgba(56,189,248,0.6)]">
                </div>

                <span
                    class="relative z-10 transition-all duration-300 group-hover:drop-shadow-md flex items-center justify-center nav-icon-wrap"
                    [ngSwitch]="link.icon">
                    <svg *ngSwitchCase="'home'" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="w-6 h-6">

                        <polyline points="9 22 9 12 15 12 15 22" />

                        </path>
                    </svg>
                    <svg *ngSwitchCase="'map'" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="w-6 h-6">
                        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                    <svg *ngSwitchCase="'missions'" xmlns="http://www.w3.org/2000/svg" width="24" height="24"

                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />

                </span>
            </a>
        </div>
    </div>
</nav>
