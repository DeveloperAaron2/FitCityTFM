<nav class="fixed bottom-0 left-0 right-0 w-full z-[1000] border-t-2 border-cyan-400 bg-gray-950 shadow-[0_-4px_24px_rgba(0,0,0,0.6)]">
    <div class="flex items-center justify-around px-4 h-16">

        <div *ngFor="let link of navLinks" class="relative flex items-center justify-center">
            <a [routerLink]="link.path" routerLinkActive="active-link"
                class="flex flex-col items-center justify-center w-12 h-12 rounded-full transition-all duration-300 hover:scale-110 group">
                <!-- Círculo para ruta activa (azul cielo claro) -->
                <div class="active-circle absolute inset-0 bg-sky-500/60 rounded-full opacity-0 transition-all duration-300 shadow-[0_0_10px_rgba(14,165,233,0.5)]"></div>
                <!-- Círculo para hover -->
                <div class="absolute inset-0 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300 shadow-[0_0_12px_rgba(56,189,248,0.6)]"></div>
                <span class="relative z-10 text-xl transition-all duration-300 group-hover:text-2xl group-hover:drop-shadow-md">{{ link.icon }}</span>
            </a>
        </div>

    </div>
</nav>
