<div class="auth-screen">

    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">FIT<span>CITY</span></div>
        <p class="auth-subtitle">Tu ciudad. Tu entrenamiento. 🏋️</p>

        <!-- Error -->
        <div class="auth-error" *ngIf="error()">
            <span>⚠️</span> {{ error() }}
        </div>

        <!-- Form -->
        <form (ngSubmit)="submit()" class="auth-form">

            <div class="auth-field">
                <label>Email</label>
                <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required
                    autocomplete="email" />
            </div>

            <div class="auth-field">
                <label>Contraseña</label>
                <div class="password-wrapper">
                    <input [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="password" name="password"
                        placeholder="••••••••" required autocomplete="current-password" />
                    <button type="button" class="password-toggle" (click)="showPassword.set(!showPassword())"
                        tabindex="-1">
                        {{ showPassword() ? '🐵' : '🙈' }}
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-btn" [disabled]="loading()">
                <span *ngIf="!loading()">Iniciar sesión</span>
                <span *ngIf="loading()" class="auth-spinner"></span>
            </button>

        </form>

        <p class="auth-link">¿No tienes cuenta? <a routerLink="/register">Regístrate</a></p>

    </div>

</div>

<style>
    .auth-screen {
        min-height: 100dvh;
        background: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: system-ui, sans-serif;
    }

    .auth-card {
        width: 100%;
        max-width: 400px;
        background: rgba(255, 255, 255, .05);
        border: 1px solid rgba(255, 255, 255, .1);
        border-radius: 24px;
        padding: 36px 28px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .auth-logo {
        text-align: center;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 2px;
        color: #e2e8f0;
    }

    .auth-logo span {
        color: #22d3ee;
    }

    .auth-subtitle {
        text-align: center;
        font-size: 13px;
        color: #94a3b8;
        margin-top: -12px;
    }

    .auth-error {
        background: rgba(239, 68, 68, .1);
        border: 1px solid rgba(239, 68, 68, .3);
        color: #f87171;
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 13px;
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .auth-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .auth-field label {
        font-size: 12px;
        font-weight: 700;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: .5px;
    }

    .auth-field input {
        background: rgba(255, 255, 255, .06);
        border: 1px solid rgba(255, 255, 255, .12);
        border-radius: 12px;
        padding: 12px 16px;
        color: #e2e8f0;
        font-size: 15px;
        outline: none;
        transition: border-color .2s;
    }

    .auth-field input:focus {
        border-color: #22d3ee;
        box-shadow: 0 0 0 3px rgba(34, 211, 238, .15);
    }

    .auth-field input::placeholder {
        color: #475569;
    }

    .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .password-wrapper input {
        width: 100%;
        padding-right: 48px; /* Espacio para el botón */
    }

    .password-toggle {
        position: absolute;
        right: 12px;
        background: transparent;
        border: none;
        color: #94a3b8;
        cursor: pointer;
        font-size: 16px;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform .1s, color .2s;
        user-select: none;
    }

    .password-toggle:hover {
        color: #22d3ee;
        transform: scale(1.1);
    }

    .auth-btn {
        margin-top: 6px;
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #22d3ee, #3b82f6);
        border: none;
        border-radius: 14px;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: opacity .2s, transform .1s;
    }

    .auth-btn:hover:not(:disabled) {
        opacity: .9;
        transform: translateY(-1px);
    }

    .auth-btn:disabled {
        opacity: .5;
        cursor: not-allowed;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .auth-spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, .3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin .7s linear infinite;
    }

    .auth-link {
        text-align: center;
        font-size: 13px;
        color: #64748b;
    }

    .auth-link a {
        color: #22d3ee;
        text-decoration: none;
        font-weight: 700;
    }

    .auth-link a:hover {
        text-decoration: underline;
    }
</style>
